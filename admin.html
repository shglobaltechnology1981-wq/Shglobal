<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#004080;
color:#fff;
padding:20px;
text-align:center;
position:relative;
}

.logo{
width:80px;
margin-bottom:10px;
}

.logout{
position:absolute;

text-decoration:none;
border-radius:5px;
}

.container{
width:95%;
margin:auto;
padding:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.card h2{
margin-bottom:15px;
font-size:22px;
}

.card a{
display:inline-block;
padding:10px 20px;
background:#004080;
color:white;
text-decoration:none;
border-radius:5px;
}

footer{
margin-top:30px;
background:#222;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>

<script>

if(localStorage.getItem("admin")!="yes"){

window.location.href="login.html";

}

function logout(){

localStorage.removeItem("admin");

}

</script>
