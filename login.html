<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SH Global Technology - Admin Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}
.login-box{
    width:350px;
    margin:100px auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
.logo{
    display:block;
    width:80px;
    margin:0 auto 15px;
}
h2{
    text-align:center;
    color:#004080;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#004080;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#0066cc;
}
.footer{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo" alt="Logo">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="footer">
SH Global Technology
</div>

</div>

<script>

function login(){

let user=document.getElementById("username").value.trim();

let pass=document.getElementById("password").value.trim();

if(user==="admin" && pass==="12345"){

localStorage.setItem("admin","yes");

window.location.href="admin.html";

}else{

alert("Invalid Username or Password");

}

}

</script>

</body>
</html>
