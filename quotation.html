<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHGT Quotation</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="header">

<img src="images/logo.png" class="logo">

<h1>SH Global Technology</h1>

<h2>Quotation</h2>

</header>



<section class="contact">


<label>Customer Name</label>
<br>
<input id="customerName" type="text">

<br><br>


<label>Company Name</label>
<br>
<input id="companyName" type="text">

<br><br>


<label>Mobile Number</label>
<br>
<input id="mobile" type="text">


<br><br>


<label>Select Product</label>
<br>

<select id="product">

<option value="JUKI DDL-900|50000">
JUKI DDL-900
</option>

<option value="JUKI Overlock|65000">
JUKI Overlock
</option>

<option value="JUKI Bartack|120000">
JUKI Bartack
</option>

</select>


<br><br>


<label>Quantity</label>
<br>

<input id="qty" type="number" value="1">


<br><br>


<button onclick="generateQuotation()">

Generate Quotation

</button>



<div id="quotationResult"></div>


</section>



<script src="quotation.js"></script>


</body>

</html>
