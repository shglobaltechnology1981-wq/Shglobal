<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation - SH Global Technology</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}
.header{
    text-align:center;
    border-bottom:2px solid #004080;
    padding-bottom:15px;
}
.logo{
    width:80px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
table,th,td{
    border:1px solid #000;
}
th,td{
    padding:10px;
    text-align:center;
}
input{
    width:100%;
    padding:6px;
    border:none;
}
button{
    margin-top:20px;
    padding:10px 20px;
    background:#004080;
    color:#fff;
    border:none;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
<img src="logo.png" class="logo">
<h2>SH Global Technology</h2>
<p>Industrial Sewing Machine Sales • Spare Parts • Service</p>

<p>
Quotation No:
<b id="qno"></b><br>
Date:
<b id="date"></b>
</p>
</div>

<h3>Customer Information</h3>

<p>
Customer Name:<br>
<input type="text">
</p>

<p>
Company Name:<br>
<input type="text">
</p>

<p>
Address:<br>
<input type="text">
</p>

<table>

<tr>
<th>Product</th>
<th>Qty</th>
<th>Unit Price</th>
<th>Total</th>
</tr>

<tr>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
</tr>

<tr>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
</tr>

<tr>
<td colspan="3"><b>Grand Total</b></td>
<td><input></td>
</tr>

</table>

<button onclick="window.print()">
🖨 Print / Save PDF
</button>

<script>

document.getElementById("date").innerHTML =
new Date().toLocaleDateString();

document.getElementById("qno").innerHTML =
"QT-" + Date.now();

</script>

</body>
</html>
