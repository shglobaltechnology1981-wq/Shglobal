<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machinery - SH Global Technology</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
}
header{
    background:#004080;
    color:#fff;
    text-align:center;
    padding:20px;
}
.container{
    width:95%;
    margin:auto;
    padding:20px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
.card{
    background:#fff;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    text-align:center;
    padding:15px;
}
.card img{
    width:100%;
    height:220px;
    object-fit:contain;
}
.card h3{
    margin:10px 0;
}
.btn{
    display:inline-block;
    background:#004080;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:5px;
}
</style>

</head>
<body>

<header>
<h1>SH Global Technology</h1>
<p>Industrial Sewing Machines</p>
</header>

<div class="container">

<div class="grid">

<div class="card">
<img src="juki-ddl900c.jpg" alt="JUKI DDL-9000C">
<h3>JUKI DDL-9000C</h3>
<p>Single Needle Lock Stitch Machine</p>
<a href="contact.html" class="btn">Contact</a>
</div>

<div class="card">
<img src="juki-overlock.jpg" alt="JUKI Overlock">
<h3>JUKI Overlock</h3>
<p>Industrial Overlock Machine</p>
<a href="contact.html" class="btn">Contact</a>
</div>

<div class="card">
<img src="juki-buttonhole.jpg" alt="JUKI Button Hole">
<h3>JUKI Button Hole</h3>
<p>Button Hole Machine</p>
<a href="contact.html" class="btn">Contact</a>
</div>

<div class="card">
<img src="juki-ps800.jpg" alt="JUKI PS-800">
<h3>JUKI PS-800</h3>
<p>Pattern Sewing Machine</p>
<a href="contact.html" class="btn">Contact</a>
</div>

</div>

</div>

</body>
</html>
