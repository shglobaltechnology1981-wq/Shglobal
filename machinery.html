<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Machinery - SH Global Technology</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#004080;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#222;
    text-align:center;
    padding:12px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:10px;
    font-weight:bold;
}

.container{
    width:95%;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    padding:15px;
    text-align:center;
}

.card img{
    width:100%;
    height:220px;
    object-fit:contain;
}

.card h3{
    margin:10px 0;
}

.card p{
    color:#555;
}

.price{
    color:red;
    font-size:18px;
    font-weight:bold;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#004080;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

</style>

</head>

<body>

<header>

<img src="logo.png" width="90">

<h1>SH Global Technology</h1>

<p>Industrial Sewing Machines</p>

</header>

<nav>

<a href="index.html">🏠 Home</a>

<a href="catalogue.html">📖 Catalogue</a>

<a href="gallery.html">🖼 Gallery</a>

<a href="contact.html">☎ Contact</a>

</nav>

<div class="container">

<h2 align="center">
Industrial Sewing Machines
</h2>

<div id="product-list" class="grid">

Loading Products...

</div>

</div>

<footer>

© 2026 SH Global Technology

</footer>

<script>

fetch("products.json")

.then(response=>response.json())

.then(products=>{

let html="";

products.forEach(product=>{

html+=`

<div class="card">

<img src="${product.image}"

alt="${product.name}"

onerror="this.src='logo.png'">

<h3>${product.name}</h3>

<p>${product.description}</p>

<div class="price">

${product.price}

</div>

<a href="contact.html"

class="btn">

Contact Now

</a>

</div>

`;

});

document.getElementById("product-list").innerHTML=html;

})

.catch(error=>{

document.getElementById("product-list").innerHTML="Products Not Found.";

});

</script>

</body>
</html>
